spring.application.name=gerenciamento-avisos
 
# Configuracao do banco PostgreSQL
spring.datasource.url=jdbc:postgresql://localhost:5432/gerenciamento_avisos
spring.datasource.username=universipratico
spring.datasource.password=universipratico
spring.datasource.driver-class-name=org.postgresql.Driver
 
# Configuracao do Hibernate/JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

 
